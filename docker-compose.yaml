services:
  client:
    image: node:20
    tty: true
    working_dir: /client
    ports:
      - ${CLIENT_PORT}:${CLIENT_PORT}
    volumes:
      - ./client:/client
      - ./client/node_modules:/client/node_modules
    command: npm run start
    networks:
      - hardhat-network

  server:
    image: node:20
    tty: true
    env_file:
      - .env
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    working_dir: /server
    networks:
      - hardhat-network
    volumes:
      - ./tsconfig.base.json:/tsconfig.base.json
      - ./server:/server
      - ./server/node_modules:/node_modules
      - ./blockchain/artifacts:/blockchain/artifacts
      - ./blockchain/typechain:/blockchain/typechain
      - ./blockchain/dist:/blockchain/dist
      - ./blockchain/ignition/deployments/chain-${CHAIN_ID}/deployed_addresses.json:/blockchain/dist/${CHAIN_ID}-contracts.json
    command: npm run start:dev

  blockchain:
    image: node:20
    tty: true
    ports:
      - "8545:8545"
    volumes:
      - ./tsconfig.base.json:/tsconfig.base.json
      - ./blockchain:/blockchain
      - ./blockchain/node_modules:/node_modules
    working_dir: /blockchain
    env_file:
      - .env
    command: bash -c "npx hardhat node"
    networks:
      - hardhat-network

networks:
  hardhat-network:
    driver: bridge