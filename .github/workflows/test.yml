name: Run Hardhat Tests in Docker

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject environment variables
        run: |
          echo "CLIENT_PORT=3000" >> .env
          echo "SERVER_PORT=4000" >> .env
          echo "CHAIN_ID=31337" >> .env

      - name: Set up and run blockchain container
        run: |
          docker compose -f docker-compose.yaml up -d blockchain
          sleep 10

      - name: Run tests in blockchain container
        run: |
          docker compose exec -T blockchain bash -c "npm ci && npx hardhat compile && npx hardhat test"

      - name: Shut down containers
        if: always()
        run: docker compose -f docker-compose.yaml down
